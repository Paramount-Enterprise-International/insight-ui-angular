<i-section>
  <i-section-header>
    <h1>IAvatar</h1>
  </i-section-header>

  <!-- ─── Sizes (preset) ─────────────────────────────────────────────── -->
  <i-section-body>
    <h3 class="mb-md">Preset Sizes (icon fallback)</h3>
    <div class="flex flex-row gap-md align-end">
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="3xs" />
        <span class="text-sm text-subtle">3xs</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="2xs" />
        <span class="text-sm text-subtle">2xs</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="xs" />
        <span class="text-sm text-subtle">xs</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="sm" />
        <span class="text-sm text-subtle">sm</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="md" />
        <span class="text-sm text-subtle">md</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="lg" />
        <span class="text-sm text-subtle">lg</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="xl" />
        <span class="text-sm text-subtle">xl</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="2xl" />
        <span class="text-sm text-subtle">2xl</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="3xl" />
        <span class="text-sm text-subtle">3xl</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar size="4xl" />
        <span class="text-sm text-subtle">4xl</span>
      </div>
    </div>
  </i-section-body>

  <!-- ─── Shapes ─────────────────────────────────────────────────────── -->
  <i-section-body>
    <h3 class="mb-md">Shapes</h3>
    <div class="flex flex-row gap-md align-center">
      <div class="flex flex-col align-center gap-xs">
        <i-avatar shape="circle" size="lg" />
        <span class="text-sm text-subtle">circle</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar shape="square" size="lg" />
        <span class="text-sm text-subtle">square</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar shape="rounded-square" size="lg" />
        <span class="text-sm text-subtle">rounded-square</span>
      </div>
    </div>
  </i-section-body>

  <!-- ─── Custom px sizes ────────────────────────────────────────────── -->
  <i-section-body>
    <h3 class="mb-md">Custom Pixel Sizes</h3>
    <div class="flex flex-row gap-md align-end">
      <div class="flex flex-col align-center gap-xs">
        <i-avatar [size]="40" />
        <span class="text-sm text-subtle">40px</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar [size]="80" />
        <span class="text-sm text-subtle">80px</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar [size]="120" />
        <span class="text-sm text-subtle">120px</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar [size]="160" />
        <span class="text-sm text-subtle">160px</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar [size]="200" />
        <span class="text-sm text-subtle">200px</span>
      </div>
      <div class="flex flex-col align-center gap-xs">
        <i-avatar [size]="250" />
        <span class="text-sm text-subtle">250px</span>
      </div>
    </div>
  </i-section-body>

  <!-- ─── Class injection ────────────────────────────────────────────── -->
  <i-section-body>
    <h3 class="mb-md">Class Injection</h3>
    <div class="flex flex-row gap-md align-center">
      <i-avatar className="border-2 border-primary" size="lg" />
      <i-avatar className="shadow-md" shape="rounded-square" size="lg" />
    </div>
  </i-section-body>
</i-section>
